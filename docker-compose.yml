services:

    order-service:
        container_name: order-service
        build: ./order-service
        ports:
            - "8081:8081"
        environment:
            - SERVER_PORT=8081
        restart: always
        volumes:
            - ~/.aws:/home/appuser/.aws:ro

    payment-service:
        container_name: payment-service
        build: ./payment-service
        ports:
            - "8082:8082"
        environment:
            - SERVER_PORT=8082
        restart: always
        volumes:
            - ~/.aws:/home/appuser/.aws:ro
